<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Event RSVP</title>
</head>
<body>
    <button id="lever" class="lever" aria-pressed="true" title="Hide page">⚙</button>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <header class="text-center mb-4">
                    <h1 class="mb-1">You're Invited</h1>
                    <p class="text-muted">RSVP to let us know if you'll attend.</p>
                </header>

                <section class="card mb-4 p-4 shadow-sm">
                    <form id="rsvpForm" class="row g-2 align-items-end">
                        <div class="col-sm-7">
                            <label for="nameInput" class="form-label visually-hidden">Your name</label>
                            <input id="nameInput" class="form-control form-control-lg" placeholder="Your full name" autocomplete="name">
                        </div>
                        <div class="col-sm-3">
                            <label for="attendSelect" class="form-label visually-hidden">Attendance</label>
                            <select id="attendSelect" class="form-select form-select-lg">
                                <option value="yes">Yes — I'll attend</option>
                                <option value="no">No — I can't make it</option>
                            </select>
                        </div>
                        <div class="col-sm-2 d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Submit</button>
                        </div>
                    </form>
                </section>

                <section class="card p-3 shadow-sm mb-4">
                    <div id="summary" class="mb-2 text-muted">No responses yet</div>
                    <ul id="attendeesList" class="list-group list-group-flush"></ul>
                </section>

                <footer class="text-center text-muted small">
                    Built with simple client-side state — no backend required.
                </footer>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
